const cases = [
  {
    id:"01", title:"When the Founder Is the Bottleneck",
    client:"Growth-Stage Startup", industry:"Technology / SaaS", tag:"Startups & Founders",

    stat:{v:"18 months",l:"of bottlenecked decisions — resolved in one strategic intervention"},

  },
  {
    id:"02", title:"The Succession Nobody Talked About",
    client:"Second-Generation Family Business", industry:"Manufacturing & Distribution", tag:"Family Businesses",

  },
  {
    id:"03", title:"The Government Tender That Changed Everything",
    client:"Private Sector Organization", industry:"Infrastructure & Public Services", tag:"Government & Public Sector",
    quote:"Everyone else competed on price. We competed on strategic alignment. There was no contest.",
    stat:{v:"4×",l:"larger contract value secured by repositioning as a long-term strategic partner"},

  {

    quote:"They wanted startup speed inside a conglomerate structure. The structure always won.",
    stat:{v:"11→4 months",l:"time-to-market after restructuring the venture operating model"},
    problem:"A large conglomerate wanted to launch a new venture in a high-growth sector. They applied existing procurement, HR, and governance processes and expected startup speed. Twelve months in, they had a team, a budget, and almost no progress. Talent was leaving for actual startups.",

  {

    stat:{v:"18 months",l:"lost executing the wrong strategy before an embedded strategic reset changed direction"},
    problem:"A multinational entered a new geography expecting it to behave like its home market — same positioning, same channel strategy, same org design. Eighteen months in, market share was flat, key distributor relationships were strained, and regional leadership was spending more time defending decisions to HQ than making new ones.",

  {

    approach:"Quantix Strategies ran a Strategy Activation process — a translation exercise, not another planning exercise. We converted strategic priorities into a 90-day roadmap with named owners, defined decision checkpoints, and visible progress indicators. We introduced a monthly Strategy Operations Review — a 90-minute leadership ritual that kept strategy visible and accountable.",

    id:"07", title:"Raising Capital Without a Strategy Story",

  {

  {
    id:"09", title:"When Two Departments Had Two Different Strategies",

  {
    id:"10", title:"The Market Research That Cost Millions by Not Happening",
